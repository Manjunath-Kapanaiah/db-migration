name: Database Migration

on:
  push:
    paths:
      - 'migrations/schema.sql'

jobs:

  migrate:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Execute Migration
        run: |
          mkdir logs
          echo "Migration Successful" > logs/migration.log

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: migration-logs
          path: logs/migration.log

      - name: Trigger API Pipeline
        run: |
          curl --request POST \
          "${{ secrets.GITLAB_URL }}/api/v4/projects/${{ secrets.API_PROJECT_ID }}/trigger/pipeline" \
          --form token=${{ secrets.GITLAB_TRIGGER_TOKEN }} \
          --form ref=main \
          --form "variables[DB_MIGRATION_STATUS]=SUCCESS"
